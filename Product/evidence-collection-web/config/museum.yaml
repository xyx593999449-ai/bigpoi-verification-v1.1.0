  - name: "国家博物馆"
    type: "official"
    url: "https://www.chnmuseum.cn/"
    weight: 0.95
    description: "国家一级博物馆信息"
    update_frequency: "实时"

  # 互联网专有源
  - name: "百度百科-博物馆"
    type: "internet"
