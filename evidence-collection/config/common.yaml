      referer: "" # 如果绑定了 Referer，请填写具体域名，否则为空

  bmap:
    - ak: "2xBld7istSKnGGcNmGrHgQUO1TjuM2Cm"
      referer: "https://xnova.com/"
    - ak: "F394d2819a214c06d340783634ab1e36"
