# POI核实资料源配置文件 - 共用部分
# 版本: 2.0
# 说明: 本文件包含所有POI类型共用的配置
#       包括: 全局配置、API Key凭据池、图商配置
# 权重范围: 0.0-1.0，1.0为最高可信度

# ============================================================================
# 全局配置
# ============================================================================
global:
  # 默认置信度阈值
  confidence_threshold: 0.8
  # 距离偏差阈值（米）
  distance_threshold: 50
  # 名称相似度阈值
  name_similarity_threshold: 0.85
  # 请求超时时间（秒）
  request_timeout: 30
  # 重试次数
  retry_count: 3

# ============================================================================
# 内部代理接口配置
# ============================================================================
# 说明: 内部图商代理接口，统一处理认证、限流、重试等问题
# 策略: 优先调用内部代理，失败后降级到直接调用图商API
internal_proxy:
  # 是否启用内部代理
  enabled: true
  # 内部代理基础URL
  base_url: "http://10.82.122.209:9081/botshop/proxy/mapapi"
  # 请求超时时间（秒）
  timeout: 30
  # 重试次数
  retry_count: 3
  # 代理失败时是否降级到直接API调用
  fallback_to_direct: true

# Source 映射配置
# 说明: 将内部使用的source标识映射到图商API的source参数
source_mapping:
  amap: amap2    # 高德地图
  bmap: bmap     # 百度地图
  qmap: qmap     # 腾讯地图

