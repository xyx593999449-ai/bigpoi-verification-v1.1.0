# ============================================================================
# 图商部分 - 所有POI类型均需调用的共用地图API
# ============================================================================
# 说明: 这些数据源对所有POI类型都适用，统一管理，避免在每个POI类型中重复定义
# 策略: 程序优先调用图商，获得基础位置和分类信息，然后再调用类型特定的官方渠道
map_vendors:
  # ========== 高德地图 ==========
  amap:
    name: "高德地图"
    type: "map_vendor"
    url: "https://www.amap.com/"
    api_endpoint: "https://restapi.amap.com/v3/place/text"
    api_key_ref: "amap"
    weight: 0.85
    description: "高德地图POI数据（适用所有类型）"
    update_frequency: "周度"
    priority: 1  # 优先调用顺序

  # ========== 百度地图 ==========
  bmap:
    name: "百度地图"
    type: "map_vendor"
    url: "https://map.baidu.com/"
    api_endpoint: "https://api.map.baidu.com/place/v2/search"
    api_key_ref: "bmap"
    weight: 0.85
    description: "百度地图POI数据（适用所有类型）"
    update_frequency: "周度"
    priority: 2

  # ========== 腾讯地图 ==========
  qmap:
    name: "腾讯地图"
    type: "map_vendor"
    url: "https://map.qq.com/"
    api_endpoint: "https://apis.map.qq.com/ws/place/v1/search"
    api_key_ref: "qmap"
    weight: 0.8
    description: "腾讯地图POI数据（适用所有类型）"
    update_frequency: "周度"
    priority: 3

# ============================================================================
# 数据源类型权重参考
# ============================================================================
source_type_weights:
  official: 1.0      # 官方渠道
  map_vendor: 0.85   # 权威图商
  internet: 0.6      # 互联网抓取
  web_crawler: 0.55  # 网络爬虫

# ============================================================================
# 更新频率映射（用于计算数据时效性）
# ============================================================================
update_frequency_map:
  实时: 1.0
  日度: 0.95
  周度: 0.9
  月度: 0.85
  季度: 0.8
  年度: 0.75
  不定期: 0.6

# ============================================================================
# 使用说明
# ============================================================================
# 1. 图商部分(map_vendors)
#    - 对所有POI类型均适用
#    - 程序启动时统一加载
#    - 每个POI类型会自动调用所有图商API获取基础数据
#
# 2. POI类型特定配置
#    - 每个POI类型有独立配置文件: {poi_type}.yaml
#    - 包含该类型特有的官方渠道和专有源
#    - 官方渠道: 权重1.0（最可信）
#    - 互联网源: 权重0.55-0.8
#
# 3. 程序调用顺序
#    Step1: 加载共用配置本文件
#    Step2: 根据POI类型加载 {poi_type}.yaml
#    Step3: 优先级: 官方 > 图商 > 互联网专有
#    Step4: 多源融合计算加权置信度
