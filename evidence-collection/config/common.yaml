    - ak: "cc20lYsz3cGWBVaIfzGYqCGBNzOZMsHX"
      referer: "https://ditu.city8.com/"
    - ak: "g1axqYWMnGnioP0gVcMmmW8WUPAF8m6p"
      referer: ""
    - ak: "rq04plvocQ1hVH8ENvSfXLIqosIEAHnP"
      referer: ""
    - ak: "k2SX2SmJqCl0u3352QFjZy7bqSawVwnL"
