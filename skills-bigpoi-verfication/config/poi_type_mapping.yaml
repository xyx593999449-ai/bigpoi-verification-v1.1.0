# POI类型代码映射配置
# 将公司内部POI类型代码映射到大POI白名单类型名称
# 用于原始表poi_init中的poi_type字段识别

# 映射关系说明：
# - key: 大POI白名单类型名称（英文）
# - type_codes: 对应的公司内部类型代码列表
# - description: 类型说明

mappings:
  # 医疗机构
  hospital:
    type_codes:
      - "09"           # 医疗保健服务相关（所有09开头的代码）
      - "090000"       # 医疗保健服务场所
      - "090100"       # 综合医院
      - "090101"       # 三级甲等医院
      - "090102"       # 卫生院
      - "090200"       # 专科医院
      - "090201"       # 整形美容
      - "090202"       # 口腔医院
      - "090203"       # 眼科医院
      - "090204"       # 耳鼻喉医院
      - "090205"       # 胸科医院
      - "090206"       # 骨科医院
      - "090207"       # 肿瘤医院
      - "090208"       # 脑科医院
      - "090209"       # 妇科医院
      - "090210"       # 精神病医院
      - "090211"       # 传染病医院
      - "090300"       # 诊所
      - "090400"       # 急救中心
      - "090500"       # 疾病预防机构
      - "090600"       # 医药保健相关
      - "090700"       # 动物医疗场所
      - "090800"       # 医疗附属设施
    description: "医疗机构，包括综合医院、专科医院、诊所等医疗保健服务场所"

  # 政府机关
  government:
    type_codes:
      - "130000"       # 政府及社会团体相关
      - "130100"       # 政府机关相关
      - "130101"       # 国家级机关及事业单位
      - "130102"       # 省直辖市级政府及事业单位
      - "130103"       # 地市级政府及事业单位
      - "130104"       # 区县级政府及事业单位
      - "130105"       # 乡镇级政府及事业单位
      - "130106"       # 乡镇以下级政府及事业单位
    description: "政府机关，各级党委、人大、政协、人民政府及所属委办局"

  # 公安机关
  police:
    type_codes:
      - "130500"       # 公检法机关
      - "130501"       # 公安警察
    description: "公安机关，各级公安部门"

  # 检察院
  procuratorate:
    type_codes:
      - "130502"       # 检察院
    description: "检察院，法律监督机关"

  # 法院
  court:
    type_codes:
      - "130503"       # 法院
    description: "法院，审判机关"

  # 景区
  scenic:
    type_codes:
      - "11"           # 风景风景名胜相关（所有11开头的代码）
      - "110000"       # 风景名胜相关
      - "110001"       # 5A旅游景点
      - "110002"       # 4A旅游景点
      - "110003"       # 3A旅游景点
      - "110004"       # 2A旅游景点
      - "110005"       # 1A旅游景点
      - "110100"       # 公园广场
      - "110101"       # 公园
      - "110200"       # 风景名胜
      - "110203"       # 省级景点
      - "110209"       # 观景点
      - "110210"       # 红色景区
    description: "景区，包括各类旅游景点、风景名胜、公园等"

  # 博物馆
  museum:
    type_codes:
      - "140100"       # 博物馆
      - "140101"       # 奥迪博物馆等具体品牌博物馆
      - "140102"       # 梅赛德斯-奔驰博物馆等
    description: "博物馆，收藏、展示、研究各类文物的场所"

  # 高等院校
  university:
    type_codes:
      - "141201"       # 高等院校
      - "141200"       # 学校（大类）
    description: "高等院校，经教育行政部门批准的学历教育机构"

  # 机场
  airport:
    type_codes:
      - "150100"       # 机场相关
      - "150104"       # 飞机场
      - "150105"       # 机场出发/到达
      - "150106"       # 直升机场
      - "150107"       # 机场货运处
      - "150108"       # 航站楼
      - "150101"       # 候机室
      - "150102"       # 摆渡车站
    description: "机场，民用航空机场及相关设施"

  # 火车站
  railway_station:
    type_codes:
      - "150200"       # 火车站
      - "150201"       # 候车室
      - "150202"       # 进站口/检票口
      - "150203"       # 出站口
      - "150204"       # 站台
      - "150205"       # 售票
      - "150210"       # 货运火车站
      - "150211"       # 火车站广场
    description: "火车站，从事铁路客货运输业务的场所"

# 类型代码匹配规则说明：
# 1. 精确匹配：poi_type 完全等于 type_codes 中的某个值
# 2. 前缀匹配：poi_type 以 type_codes 中的某个值开头（用于大类匹配）
# 3. 匹配顺序：按配置文件中的顺序进行匹配，先匹配到的为准

# 示例：
# - poi_type = "090101" → 匹配到 hospital（三级甲等医院）
# - poi_type = "130501" → 匹配到 police（公安警察）
# - poi_type = "091234" → 匹配到 hospital（前缀"09"匹配）
# - poi_type = "111234" → 匹配到 scenic（前缀"11"匹配）
